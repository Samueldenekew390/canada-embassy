<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Registration</title>

    <link rel="stylesheet" href="register.css" />

    <script type="module" src="register.js" defer></script>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1>Online Registration</h1>
        <p>Please complete the registration form.</p>

        <form id="registrationForm">
          <div class="grid">
            <div class="input-group">
              <label>Full Name</label>
              <input type="text" id="fullName" required />
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email" id="email" required />
            </div>

            <div class="input-group">
              <label>Phone Number</label>
              <input type="text" id="phone" required />
            </div>

            <div class="input-group">
              <label>Gender</label>

              <select id="gender" required>
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>

            <div class="input-group">
              <label>Date of Birth</label>
              <input type="date" id="dob" required />
            </div>

            <div class="input-group">
              <label>Nationality</label>
              <input type="text" id="nationality" required />
            </div>
          </div>

          <div class="input-group">
            <label>Address</label>

            <textarea id="address" rows="4" required></textarea>
          </div>

          <h2>Upload Photo</h2>

          <div class="input-group">
            <label>Passport Photo</label>

            <input type="file" id="photo" accept="image/*" required />
          </div>

          <button type="submit" id="submitBtn">Register</button>
        </form>

        <!-- SUCCESS BOX -->

        <div
          id="successBox"
          style="display: none; text-align: center; margin-top: 30px"
        >
          <h2>Registration Successful</h2>

          <p>
            <strong>Registration ID:</strong>
            <span id="registrationID"></span>
          </p>

          <img id="qrImage" width="250" alt="QR Code" />

          <br /><br />

          <a id="qrLink" target="_blank"> Open Verification Page </a>
        </div>
      </div>
    </div>
  </body>
</html>
